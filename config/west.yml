manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    # Additional modules containing boards/shields/custom code can be listed here as well
    # See https://docs.zephyrproject.org/3.2.0/develop/west/manifest.html#projects
  projects:
    - name: zmk
      remote: zmkfirmware
      # Pinned to pre-Zephyr-4.1 (board variant requirement broke
      # bare `nice_nano` board name). Bump after migrating build.yaml
      # to `nice_nano@1//zmk` naming.
      revision: b68b29d
      import: app/west.yml
  self:
    path: config
